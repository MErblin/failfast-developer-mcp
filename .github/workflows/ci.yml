name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Lint with Ruff
        run: uv run ruff check src/ tests/

      - name: Type check with mypy
        run: uv run mypy src/failfast/ --ignore-missing-imports
        continue-on-error: true  # Enable strict enforcement once all types are resolved

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Self-scan (dogfooding)
        run: uv run failfast scan src/failfast --format json
        continue-on-error: true  # Report findings without failing CI initially

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
